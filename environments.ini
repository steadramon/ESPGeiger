# XH-S3E hardware (ESP32-S3 board with onboard OLED + NeoPixel + dual button
# + I2S speaker). Each input variant just adds GEIGER_TYPE, model and pins.
[base:xh_s3e]
extends = base:esp32s3_oled
lib_deps =
  ${base:esp32s3_oled.lib_deps}
  ${libraries.neopixel}
build_flags =
  ${base:esp32s3_oled.build_flags}
  -DOLED_SDA=41
  -DOLED_SCL=42
  -DOLED_FLIP=true
  -DOLED_PINS_BLOCKED=true
  -DGEIGER_NEOPIXEL
  -DNEOPIXEL_PIN=48
  -UPUSHBUTTON_PIN
  -DPUSHBUTTON_PIN=40
  -DPUSHBUTTON_PIN2=39
  -DAUDIO_TICK
  -DAUDIO_TICK_BCLK=15
  -DAUDIO_TICK_WS=16
  -DAUDIO_TICK_DOUT=7
  -DAUDIO_TICK_PINS_BLOCKED
  -DAUDIO_MUTE_PIN=0
  -DDISABLE_INTERNAL_BLIP=true

[env:xh_s3e_udp]
extends = base:xh_s3e
build_flags =
  ${base:xh_s3e.build_flags}
  -DGEIGER_TYPE=${geiger_type.udprx}
  -DGEIGER_MODEL='"UDP-Receiver"'

# Audio tuning rig: Poisson simulator. Set rate via /cpm?v=N to hear the
# click at any CPM.
[env:xh_s3e_test]
extends = base:xh_s3e
build_flags =
