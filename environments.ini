  -DOLED_FLIP=true
  -D OLED_SDA=4
  -D OLED_SCL=0
  -DGEIGER_RXPIN='5'
  -DGEIGER_PUSHBUTTON=true
  -DPUSHBUTTON_PIN='3'
  -DBTN_PIN_BLOCKED=true
  -D DISABLE_SERIALRX
  -DRXPIN_BLOCKED=true
  -DOLED_PINS_BLOCKED=true

[env:espgeigerlite]
