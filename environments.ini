# ESP32 + OLED + I2S audio amplifier (e.g. MAX98357A). AudioTick is opt-in
# via the tick.enable pref; user wires their amp to free pins and sets
# BCLK/WS/DOUT under the tick pref group. Defaults are common ESP32 picks
# but RXPIN may clash on cajoe-style boards, so the user MUST verify pins
# match their wiring before enabling.
[base:esp32_oled_audio]
extends = base:esp32_oled
build_flags =
  ${base:esp32_oled.build_flags}
  -DAUDIO_TICK
  -DAUDIO_TICK_BCLK=26
  -DAUDIO_TICK_WS=25
  -DAUDIO_TICK_DOUT=22

# Generic ESP32-S3 + I2S amp. Non-XH-S3E S3 boards; pins runtime-configurable
# under tick prefs. Differs from xh_s3e_* (which has board-fixed pins).
[base:esp32s3_audio]
extends = base:esp32s3_main
build_flags =
  ${base:esp32s3_main.build_flags}
  -DAUDIO_TICK
  -DAUDIO_TICK_BCLK=15
  -DAUDIO_TICK_WS=16
  -DAUDIO_TICK_DOUT=7

[base:esp32s3_oled_audio]
extends = base:esp32s3_oled
build_flags =
  ${base:esp32s3_oled.build_flags}
  -DAUDIO_TICK
  -DAUDIO_TICK_BCLK=15
  -DAUDIO_TICK_WS=16
  -DAUDIO_TICK_DOUT=7

# ESP32-C3 + I2S amp. Pins runtime-configurable.
[base:esp32c3_audio]
extends = base:esp32c3_main
build_flags =
  ${base:esp32c3_main.build_flags}
