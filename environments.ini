;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;                                 ENVIRONMENTS LIST                                    ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;List of environments that can be built                                                ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; u8g2 features we don't use: unicode (via drawXBMP), rotated text, clip
; windows. Disabling them trims ~700 B flash on OLED builds.
[u8g2_flags]
build_flags =
  -DU8G2_WITHOUT_UNICODE
  -DU8G2_WITHOUT_FONT_ROTATION
  -DU8G2_WITHOUT_CLIP_WINDOW_SUPPORT

[base:esp32_main]
platform = ${com.esp32_platform}
board = esp32dev
lib_deps =
  ${com-esp32.lib_deps}
lib_ignore = EGAsyncTCP
build_flags =
  ${com-esp32.build_flags}
  -DESP32
  -DGEIGER_PUSHBUTTON=true
  -DPUSHBUTTON_PIN=0
  -DBTN_PIN_BLOCKED=true
board_build.flash_mode = qio
board_build.filesystem = littlefs
upload_speed = 921600
extra_scripts =
    pre:scripts/gzip_assets.py
    scripts/merge_firmware.py
    post:scripts/archive_elf.py

[base:esp32d1_main]
extends = base:esp32_main
build_flags =
  ${base:esp32_main.build_flags}
  -DGEIGER_RXPIN='23'

[base:esp32s2_main]
platform = ${com.esp32_platform}
board = lolin_s2_pico
lib_deps =
  ${com-esp32.lib_deps}
lib_ignore = EGAsyncTCP
build_flags =
  ${com-esp32.build_flags}
  -DESP32
  -DGEIGER_PUSHBUTTON=true
  -DPUSHBUTTON_PIN=0
  -DBTN_PIN_BLOCKED=true
board_build.flash_mode = qio
board_build.filesystem = littlefs
upload_speed = 921600

[base:esp32s3_main]
platform = ${com.esp32_platform}
board = esp32-s3-devkitc-1
lib_deps =
  ${com-esp32.lib_deps}
lib_ignore = EGAsyncTCP
build_flags =
  ${com-esp32.build_flags}
  -DESP32
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DGEIGER_PUSHBUTTON=true
  -DPUSHBUTTON_PIN=0
  -DBTN_PIN_BLOCKED=true
board_build.flash_mode = qio
board_build.filesystem = littlefs
upload_speed = 921600
monitor_speed = 115200
extra_scripts =
    pre:scripts/gzip_assets.py
    scripts/merge_firmware.py
    post:scripts/archive_elf.py

[base:esp32s3_oled]
extends = base:esp32s3_main
lib_deps =
  ${com-esp32.lib_deps}
  ${libraries.u8g2}
build_flags =
  ${base:esp32s3_main.build_flags}
  ${u8g2_flags.build_flags}
  -DSSD1306_DISPLAY

[base:esp32_oled]
extends = base:esp32_main
lib_deps =
  ${com-esp32.lib_deps}
  ${libraries.u8g2}
build_flags =
  ${base:esp32_main.build_flags}
  ${u8g2_flags.build_flags}
  -DSSD1306_DISPLAY

# ESP32-C3 (RISC-V single-core). No PCNT so pulse counting falls back to
# the software interrupt path - same code path the ESP8266 uses.
[base:esp32c3_main]
platform = ${com.esp32_platform}
board = esp32-c3-devkitm-1
lib_deps =
  ${com-esp32.lib_deps}
lib_ignore = EGAsyncTCP
build_flags =
  ${com-esp32.build_flags}
  -DESP32
  -DIGNORE_PCNT
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DGEIGER_PUSHBUTTON=true
  -DPUSHBUTTON_PIN=0
  -DBTN_PIN_BLOCKED=true
board_build.flash_mode = qio
board_build.filesystem = littlefs
upload_speed = 921600
monitor_speed = 115200
extra_scripts =
    pre:scripts/gzip_assets.py
    scripts/merge_firmware.py
    post:scripts/archive_elf.py

[base:esp32c3_oled]
extends = base:esp32c3_main
lib_deps =
