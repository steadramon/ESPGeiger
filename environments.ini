  -DGEIGER_TYPE=${geiger_type.pulse}
  -DESPGEIGER_HW
  -DESPG_HV
  -DESPG_HV_ADC
  -DGEIGERHW_MAX_V=500
  -DGEIGER_BLIPLED=15
  -DGEIGER_PUSHBUTTON=true
  -DPUSHBUTTON_PIN=14
  -DBTN_PIN_BLOCKED=true
  -DGEIGER_MODEL='"ESPGeiger-HW"'
  -DOLED_FLIP=true
  -DRXPIN_BLOCKED=true
  -DOLED_PINS_BLOCKED=true
  -DDISABLE_INTERNAL_BLIP=true

[base:esp8266_neopixel]
