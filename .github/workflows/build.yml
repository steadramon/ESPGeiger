name: Build

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch/tag/SHA) to build. Leave blank for current.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        environments:
          - "esp32_cajoe_iotgm"
          - "esp32_cajoe_iotgm_no_pcnt"
          - "esp32_hv"
          - "esp32_serial"
          - "esp32_testpulse"
          - "esp32_testpulseint"
          - "esp32_udp"
          - "esp32oled_pulse"
          - "esp32oled_serial"
          - "esp8266_hv"
          - "esp8266oled_hv"
          - "esp8266_pulse"
          - "esp8266_pulsemin"
          - "esp8266_serial"
          - "esp8266oled_udp"
          - "esp8266_test"
          - "esp8266_testpulse"
          - "esp8266_testpulseint"
          - "esp8266oled_pulse"
          - "esp8266oled_serial"
          - "espgeigerhw"
          - "espgeigerlite"
          - "espgeigerlog"
          - "espgeigerlog_serial"
          - "espgeigerlog_testpulseint"
    runs-on: ubuntu-24.04
    name: Build with PlatformIO
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install platformio
        run: |
          python -m pip install --upgrade pip
          pip install 'platformio==6.1.9' 'intelhex==2.3.0'
      - name: Run PlatformIO
        run: platformio run -e ${{ matrix.environments }}
      - name: Upload Assets
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.environments }}
          path: |
            .pio/build/*/firmware.bin
            .pio/build/*/firmware_merged.bin
            .pio/build/*/firmware.elf
          retention-days: 7
