name: PlatformIO Build (reusable)

on:
  workflow_call:
    inputs:
      environments:
        description: 'JSON array of PlatformIO environments to build'
        required: true
        type: string
      version:
        description: 'Embed this version string into RELEASE_VERSION (leave blank for devel)'
        required: false
        type: string
        default: ''
      retention-days:
        description: 'Artifact retention in days'
        required: false
        type: number
        default: 7

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(inputs.environments) }}
    runs-on: ubuntu-24.04
    name: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-pio6.1.9-intelhex2.3.0

      - name: Cache PlatformIO toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-pio6.1.9-${{ hashFiles('platformio.ini', 'environments.ini') }}

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install 'platformio==6.1.9' 'intelhex==2.3.0'

      - name: Embed release version
        if: inputs.version != ''
        run: |
          VER="${{ inputs.version }}"
          VER="${VER#v}"   # drop a leading v (tags are vX.Y.Z; version string is X.Y.Z)
          sed -i "s/RELEASE_VERSION \"devel\"/RELEASE_VERSION \"${VER}\"/g" ESPGeiger/src/Util/DeviceInfo.h

      - name: Run PlatformIO
        run: platformio run -e ${{ matrix.environment }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.environment }}
          path: |
            .pio/build/*/firmware.bin
            .pio/build/*/firmware_merged.bin
          retention-days: ${{ inputs.retention-days }}
